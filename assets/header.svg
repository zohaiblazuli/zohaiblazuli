<svg width="900" height="300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="void" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0B0E17"/>
    </radialGradient>
    <linearGradient id="aurora" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5DE4C7" stop-opacity="0"/>
      <stop offset="30%" stop-color="#5DE4C7" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#C4A7E7" stop-opacity="0.2"/>
      <stop offset="70%" stop-color="#5DE4C7" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#C4A7E7" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="aurora2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C4A7E7" stop-opacity="0"/>
      <stop offset="40%" stop-color="#C4A7E7" stop-opacity="0.1"/>
      <stop offset="60%" stop-color="#A8C7FA" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#5DE4C7" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Void background -->
  <rect width="900" height="300" fill="url(#void)"/>

  <!-- Stars — scattered, staggered animations -->
  <g>
    <circle cx="45" cy="28" r="1.2" fill="#A8C7FA"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="120" cy="72" r="0.8" fill="#fff"><animate attributeName="opacity" values="0.1;0.6;0.1" dur="3.2s" begin="0.5s" repeatCount="indefinite"/></circle>
    <circle cx="195" cy="18" r="1.0" fill="#5DE4C7"><animate attributeName="opacity" values="0.15;0.7;0.15" dur="5s" begin="1s" repeatCount="indefinite"/></circle>
    <circle cx="260" cy="95" r="0.7" fill="#C4A7E7"><animate attributeName="opacity" values="0.2;0.5;0.2" dur="3.8s" begin="0.3s" repeatCount="indefinite"/></circle>
    <circle cx="340" cy="35" r="1.3" fill="#A8C7FA"><animate attributeName="opacity" values="0.1;0.9;0.1" dur="4.5s" begin="2s" repeatCount="indefinite"/></circle>
    <circle cx="410" cy="68" r="0.6" fill="#fff"><animate attributeName="opacity" values="0.3;0.7;0.3" dur="2.8s" begin="0.8s" repeatCount="indefinite"/></circle>
    <circle cx="490" cy="22" r="1.1" fill="#E8D4A2"><animate attributeName="opacity" values="0.1;0.6;0.1" dur="5.5s" begin="1.5s" repeatCount="indefinite"/></circle>
    <circle cx="555" cy="85" r="0.8" fill="#5DE4C7"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="630" cy="15" r="1.0" fill="#C4A7E7"><animate attributeName="opacity" values="0.15;0.65;0.15" dur="4.2s" begin="0.7s" repeatCount="indefinite"/></circle>
    <circle cx="700" cy="55" r="0.7" fill="#fff"><animate attributeName="opacity" values="0.1;0.5;0.1" dur="3s" begin="1.2s" repeatCount="indefinite"/></circle>
    <circle cx="760" cy="30" r="1.4" fill="#A8C7FA"><animate attributeName="opacity" values="0.2;0.85;0.2" dur="4.8s" begin="0.4s" repeatCount="indefinite"/></circle>
    <circle cx="830" cy="78" r="0.9" fill="#E8D4A2"><animate attributeName="opacity" values="0.1;0.7;0.1" dur="3.6s" begin="2.2s" repeatCount="indefinite"/></circle>
    <circle cx="870" cy="20" r="0.6" fill="#5DE4C7"><animate attributeName="opacity" values="0.3;0.6;0.3" dur="2.5s" begin="0.9s" repeatCount="indefinite"/></circle>
    <circle cx="78" cy="180" r="0.8" fill="#C4A7E7"><animate attributeName="opacity" values="0.15;0.55;0.15" dur="4.1s" begin="1.8s" repeatCount="indefinite"/></circle>
    <circle cx="170" cy="240" r="1.0" fill="#fff"><animate attributeName="opacity" values="0.1;0.4;0.1" dur="3.3s" begin="0.6s" repeatCount="indefinite"/></circle>
    <circle cx="310" cy="210" r="0.7" fill="#A8C7FA"><animate attributeName="opacity" values="0.2;0.6;0.2" dur="4.7s" begin="1.4s" repeatCount="indefinite"/></circle>
    <circle cx="460" cy="260" r="1.1" fill="#5DE4C7"><animate attributeName="opacity" values="0.1;0.5;0.1" dur="5.2s" begin="0.2s" repeatCount="indefinite"/></circle>
    <circle cx="580" cy="230" r="0.6" fill="#E8D4A2"><animate attributeName="opacity" values="0.2;0.7;0.2" dur="3.9s" begin="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="680" cy="270" r="0.9" fill="#C4A7E7"><animate attributeName="opacity" values="0.15;0.6;0.15" dur="4.4s" begin="1.1s" repeatCount="indefinite"/></circle>
    <circle cx="790" cy="245" r="1.2" fill="#A8C7FA"><animate attributeName="opacity" values="0.1;0.8;0.1" dur="5s" begin="0.3s" repeatCount="indefinite"/></circle>
    <circle cx="850" cy="200" r="0.7" fill="#fff"><animate attributeName="opacity" values="0.2;0.5;0.2" dur="3.1s" begin="1.7s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Shooting star 1 -->
  <g opacity="0">
    <line x1="0" y1="0" x2="60" y2="30" stroke="url(#aurora)" stroke-width="1.5" stroke-linecap="round"/>
    <animate attributeName="opacity" values="0;0;0.8;0" dur="6s" begin="2s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="100,40;500,240" dur="6s" begin="2s" repeatCount="indefinite"/>
  </g>

  <!-- Shooting star 2 -->
  <g opacity="0">
    <line x1="0" y1="0" x2="45" y2="22" stroke="#A8C7FA" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
    <animate attributeName="opacity" values="0;0;0.6;0" dur="8s" begin="5s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="600,20;900,170" dur="8s" begin="5s" repeatCount="indefinite"/>
  </g>

  <!-- Aurora band — bottom -->
  <path d="M0,240 Q150,220 300,235 T600,225 T900,240 V300 H0 Z" fill="url(#aurora)" opacity="0.6">
    <animate attributeName="d" values="M0,240 Q150,220 300,235 T600,225 T900,240 V300 H0 Z;M0,235 Q150,230 300,225 T600,235 T900,230 V300 H0 Z;M0,240 Q150,220 300,235 T600,225 T900,240 V300 H0 Z" dur="10s" repeatCount="indefinite"/>
  </path>
  <path d="M0,250 Q200,235 400,248 T700,238 T900,252 V300 H0 Z" fill="url(#aurora2)" opacity="0.4">
    <animate attributeName="d" values="M0,250 Q200,235 400,248 T700,238 T900,252 V300 H0 Z;M0,248 Q200,242 400,240 T700,248 T900,245 V300 H0 Z;M0,250 Q200,235 400,248 T700,238 T900,252 V300 H0 Z" dur="12s" repeatCount="indefinite"/>
  </path>

  <!-- Name -->
  <text x="450" y="125" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="42" font-weight="600" fill="#A8C7FA" filter="url(#glow)" letter-spacing="2">Zohaib</text>

  <!-- Tagline -->
  <text x="450" y="165" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="16" fill="#6E7681" letter-spacing="1">your average tech bro</text>

  <!-- Subtle separator line -->
  <rect x="350" y="185" width="0" height="1" rx="0.5" fill="#5DE4C7" opacity="0.4">
    <animate attributeName="width" from="0" to="200" dur="2s" fill="freeze" begin="0.5s"/>
    <animate attributeName="x" from="450" to="350" dur="2s" fill="freeze" begin="0.5s"/>
  </rect>
</svg>
