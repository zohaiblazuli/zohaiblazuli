<svg width="900" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e2e"/>
      <stop offset="30%" style="stop-color:#302d41"/>
      <stop offset="70%" style="stop-color:#302d41"/>
      <stop offset="100%" style="stop-color:#1e1e2e"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#cba6f7"/>
      <stop offset="50%" style="stop-color:#f5c2e7"/>
      <stop offset="100%" style="stop-color:#89b4fa"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="900" height="200" fill="url(#bg)" rx="12"/>

  <!-- Soft gradient orbs -->
  <circle cx="150" cy="100" r="120" fill="#cba6f7" opacity="0.03">
    <animate attributeName="opacity" values="0.03;0.06;0.03" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="100" r="100" fill="#f5c2e7" opacity="0.03">
    <animate attributeName="opacity" values="0.03;0.05;0.03" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="750" cy="100" r="120" fill="#89b4fa" opacity="0.03">
    <animate attributeName="opacity" values="0.03;0.06;0.03" dur="7s" repeatCount="indefinite"/>
  </circle>

  <!-- Gentle floating dots -->
  <g opacity="0.5">
    <circle cx="120" cy="40" r="2" fill="#cba6f7">
      <animate attributeName="cy" values="40;35;40" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="350" cy="165" r="1.5" fill="#f5c2e7">
      <animate attributeName="cy" values="165;160;165" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="580" cy="35" r="2" fill="#a6e3a1">
      <animate attributeName="cy" values="35;30;35" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="780" cy="155" r="1.5" fill="#f9e2af">
      <animate attributeName="cy" values="155;148;155" dur="4.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Name -->
  <text x="450" y="85" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="36" font-weight="bold" fill="url(#textGrad)" filter="url(#softGlow)">Zohaib</text>

  

  <!-- Soft decorative dots -->
  <g opacity="0.4">
    <circle cx="310" cy="145" r="3" fill="#cba6f7"/>
    <circle cx="380" cy="145" r="3" fill="#f5c2e7"/>
    <circle cx="450" cy="145" r="3" fill="#89b4fa"/>
    <circle cx="520" cy="145" r="3" fill="#a6e3a1"/>
    <circle cx="590" cy="145" r="3" fill="#f9e2af"/>
  </g>
</svg>
