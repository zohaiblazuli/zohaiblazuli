<svg width="900" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#282a36"/>
      <stop offset="50%" style="stop-color:#44475a"/>
      <stop offset="100%" style="stop-color:#282a36"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#bd93f9"/>
      <stop offset="50%" style="stop-color:#ff79c6"/>
      <stop offset="100%" style="stop-color:#8be9fd"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="900" height="200" fill="url(#bg)" rx="8"/>

  <!-- Glowing orbs -->
  <circle cx="100" cy="100" r="80" fill="#bd93f9" opacity="0.05">
    <animate attributeName="r" values="80;90;80" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="800" cy="100" r="80" fill="#ff79c6" opacity="0.05">
    <animate attributeName="r" values="80;90;80" dur="5s" repeatCount="indefinite"/>
  </circle>

  <!-- Floating particles -->
  <g opacity="0.4">
    <circle cx="200" cy="40" r="2" fill="#bd93f9">
      <animate attributeName="cy" values="40;30;40" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="400" cy="170" r="1.5" fill="#ff79c6">
      <animate attributeName="cy" values="170;160;170" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="50" r="2" fill="#50fa7b">
      <animate attributeName="cy" values="50;40;50" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="750" cy="160" r="1.5" fill="#8be9fd">
      <animate attributeName="cy" values="160;150;160" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Name -->
  <text x="450" y="80" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="38" font-weight="bold" fill="url(#textGrad)" filter="url(#glow)">Zohaib</text>

  <!-- Tagline -->
  

  <!-- Decorative line -->
  <line x1="250" y1="140" x2="250" y2="140" stroke="url(#textGrad)" stroke-width="2" stroke-linecap="round">
    <animate attributeName="x2" from="250" to="650" dur="1.5s" fill="freeze"/>
  </line>

  <!-- Bat silhouette -->
  <g transform="translate(420, 155) scale(0.4)" fill="#6272a4" opacity="0.3">
    <path d="M0,-20 C-15,-35 -40,-25 -50,-10 C-45,-20 -30,-15 -25,-5 C-20,-15 -10,-20 0,-10 C10,-20 20,-15 25,-5 C30,-15 45,-20 50,-10 C40,-25 15,-35 0,-20 Z"/>
  </g>
</svg>
