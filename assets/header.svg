<svg width="900" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="retroBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <filter id="pixelate">
      <feGaussianBlur stdDeviation="0.5"/>
    </filter>
  </defs>
  <rect width="900" height="200" fill="url(#retroBg)"/>

  <!-- Retro grid lines -->
  <g opacity="0.08" stroke="#f59e0b" stroke-width="0.5">
    <line x1="0" y1="40" x2="900" y2="40"/>
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="180" y1="0" x2="180" y2="200"/>
    <line x1="360" y1="0" x2="360" y2="200"/>
    <line x1="540" y1="0" x2="540" y2="200"/>
    <line x1="720" y1="0" x2="720" y2="200"/>
  </g>

  <!-- Pixel-style stars -->
  <g opacity="0.3">
    <rect x="80" y="30" width="4" height="4" fill="#f59e0b"/>
    <rect x="220" y="60" width="3" height="3" fill="#ef4444"/>
    <rect x="380" y="25" width="4" height="4" fill="#22c55e"/>
    <rect x="560" y="50" width="3" height="3" fill="#3b82f6"/>
    <rect x="700" y="35" width="4" height="4" fill="#a855f7"/>
    <rect x="830" y="55" width="3" height="3" fill="#f59e0b"/>
    <rect x="140" y="165" width="3" height="3" fill="#3b82f6"/>
    <rect x="470" y="170" width="4" height="4" fill="#ef4444"/>
    <rect x="650" y="160" width="3" height="3" fill="#22c55e"/>
  </g>

  <!-- Retro border -->
  <rect x="4" y="4" width="892" height="192" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.2" rx="2"/>
  <rect x="8" y="8" width="884" height="184" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.1" rx="2"/>

  <!-- Title with retro feel -->
  <text x="450" y="80" text-anchor="middle" font-family="'Courier New', monospace" font-size="36" font-weight="bold" fill="#f59e0b" letter-spacing="6">Zohaib</text>

  

  <!-- Decorative pixel divider -->
  <g fill="#f59e0b" opacity="0.4">
    <rect x="350" y="140" width="6" height="6"/>
    <rect x="370" y="140" width="6" height="6"/>
    <rect x="390" y="140" width="6" height="6"/>
    <rect x="410" y="140" width="6" height="6"/>
    <rect x="430" y="140" width="6" height="6"/>
    <rect x="450" y="140" width="6" height="6"/>
    <rect x="470" y="140" width="6" height="6"/>
    <rect x="490" y="140" width="6" height="6"/>
    <rect x="510" y="140" width="6" height="6"/>
    <rect x="530" y="140" width="6" height="6"/>
    <rect x="540" y="140" width="6" height="6"/>
  </g>

  <!-- Blinking retro cursor -->
  <rect x="565" y="72" width="10" height="18" fill="#f59e0b">
    <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite"/>
  </rect>
</svg>
